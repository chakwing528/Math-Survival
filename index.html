<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Survival - Voxel FPS Edition</title>
    <style>
        :root {
            --ground-color: #7c8d4c; /* 草方塊頂部色 */
            --ground-side-color: #58452b; /* 泥土色 */
            --sky-color: #87ceeb; /* 天空藍 */
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--sky-color);
            font-family: 'Courier New', Courier, monospace; /* 像素風字體 */
            user-select: none;
            -webkit-user-select: none;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            perspective: 600px;
            position: relative;
        }
        #world {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }
        /* 3D 方塊通用樣式 */
        .cube {
            position: absolute;
            transform-style: preserve-3d;
        }
        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.2); /* 簡單的邊緣陰影 */
            image-rendering: pixelated; /* 像素化渲染 */
        }
        .face.front  { transform: rotateY(  0deg) translateZ(var(--half-size)); }
        .face.back   { transform: rotateY(180deg) translateZ(var(--half-size)); }
        .face.right  { transform: rotateY( 90deg) translateZ(var(--half-size)); }
        .face.left   { transform: rotateY(-90deg) translateZ(var(--half-size)); }
        .face.top    { transform: rotateX( 90deg) translateZ(var(--half-size)); }
        .face.bottom { transform: rotateX(-90deg) translateZ(var(--half-size)); }

        /* 地面 */
        #ground {
            width: 2000px;
            height: 2000px;
            background-color: var(--ground-color);
            /* 簡單的方塊紋理 */
            background-image: 
                linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(90deg) translateZ(100px); /* 下移地面 */
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            background-color: white;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
        }
        .hud-text {
            position: absolute;
            color: white;
            text-shadow: 2px 2px 0 #000;
            font-weight: bold;
        }
        #hp-bar-container { bottom: 20px; left: 20px; width: 200px; height: 20px; background: #333; border: 2px solid #555; }
        #hp-bar { height: 100%; background: #22c55e; width: 100%; }
        #weapon-info { bottom: 50px; left: 20px; font-size: 18px; }
        #score-info { top: 20px; left: 50%; transform: translateX(-50%); font-size: 20px; }
        #start-screen, #math-screen, #game-over-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: white; z-index: 200;
            pointer-events: auto;
        }
        #math-screen { display: none; }
        #game-over-screen { display: none; }
        .pixel-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #555;
            border: 4px solid #333;
            cursor: pointer;
            font-family: inherit;
            font-size: 24px;
            color: white;
        }
        .pixel-btn:hover { background: #777; }

        /* 玩家武器模型 (簡單方塊) */
        #player-weapon {
            position: absolute;
            bottom: -100px; right: 100px;
            width: 50px; height: 50px;
            --half-size: 25px;
            transform-origin: 50% 50% -150px; /* 設置旋轉點在手臂處 */
        }
        #player-weapon .face { background-color: #555; }
        #player-weapon .face.front { background-color: #777; } /* 槍口 */

    </style>
</head>
<body>

<div id="game-container">
    <div id="world">
        <div id="ground"></div>
        <!-- 玩家武器 -->
        <div id="player-weapon" class="cube">
            <div class="face front"></div><div class="face back"></div>
            <div class="face right"></div><div class="face left"></div>
            <div class="face top"></div><div class="face bottom"></div>
        </div>
    </div>
</div>

<div id="hud">
    <div id="crosshair"></div>
    <div id="score-info" class="hud-text">任務進度: 0 / 20</div>
    <div id="hp-bar-container" class="hud-text">
        <div id="hp-bar"></div>
    </div>
    <div id="weapon-info" class="hud-text">Lv.1 基礎手槍</div>
</div>

<div id="start-screen">
    <h1>方塊生存戰線</h1>
    <p>WASD 移動, 滑鼠瞄準, 左鍵射擊</p>
    <button class="pixel-btn" onclick="startGame()">點擊開始鎖定滑鼠</button>
</div>

<div id="math-screen">
    <h1>✨ 遠古方塊解密 ✨</h1>
    <h2 id="math-question" style="font-size: 48px;"></h2>
    <div id="math-timer-bar" style="width: 300px; height: 15px; background: #333; border: 2px solid #555;">
        <div id="math-timer-fill" style="width: 100%; height: 100%; background: #eab308;"></div>
    </div>
    <h3 id="math-input" style="font-size: 36px; color: #fbbf24;">_</h3>
    <p>請使用鍵盤數字鍵作答</p>
</div>

<div id="game-over-screen">
    <h1 id="go-title"></h1>
    <p id="go-stats"></p>
    <button class="pixel-btn" onclick="resetGame()">重新挑戰</button>
</div>

<script>
    const world = document.getElementById('world');
    const gameContainer = document.getElementById('game-container');
    const playerWeapon = document.getElementById('player-weapon');
    const hpBar = document.getElementById('hp-bar');
    const weaponInfo = document.getElementById('weapon-info');
    const scoreInfo = document.getElementById('score-info');

    // --- 3D 核心變數 ---
    let camera = { x: 0, y: -100, z: 0, pitch: 0, yaw: 0 }; // y 是高度, 負值在地面上
    let keys = { w: false, a: false, s: false, d: false };
    let isPointerLocked = false;
    let isShooting = false;
    let weaponRecoil = 0;

    // --- 遊戲狀態 ---
    let gameState = 'START';
    let globalTime = 0;
    let enemiesKilled = 0;
    let totalMonstersSpawned = 0;
    const TOTAL_MONSTERS = 20;

    // --- 數值設定 (完美繼承) ---
    const WEAPONS = [
        { level: 1, name: "Lv.1 像素手槍", damage: 1, bullets: 1, fireRate: 15, playerSpeed: 4, color: '#fde047' },
        { level: 2, name: "Lv.2 雙管衝鋒", damage: 1, bullets: 1, fireRate: 8, playerSpeed: 5, color: '#60a5fa' },
        { level: 3, name: "Lv.3 方塊連射", damage: 1, bullets: 2, fireRate: 8, playerSpeed: 6, color: '#34d399' },
        { level: 4, name: "Lv.4 脈衝步槍", damage: 2, bullets: 2, fireRate: 8, playerSpeed: 7, color: '#f472b6' },
        { level: 5, name: "Lv.5 重型加農", damage: 2, bullets: 3, fireRate: 6, playerSpeed: 8, color: '#a78bfa' },
        { level: 6, name: "Lv.6 激光發射器", damage: 3, bullets: 3, fireRate: 6, playerSpeed: 9, color: '#fb923c' },
        { level: 7, name: "Lv.7 電漿風暴", damage: 3, bullets: 4, fireRate: 2, playerSpeed: 10, color: '#38bdf8' },
        { level: 8, name: "Lv.8 終極殲滅", damage: 4, bullets: 4, fireRate: 2, playerSpeed: 10, color: '#ffffff' },
        { level: 9, name: "Lv.MAX 神話方塊", damage: 5, bullets: 5, fireRate: 1, playerSpeed: 10, color: '#ef4444' }
    ];
    let monsterData = [
        {tier: 1, name: "像素僵屍", hp: 5, speed: 0.5, size: 30, color: '#ef4444', count: 6},
        {tier: 2, name: "狂暴苦力怕", hp: 50, speed: 1.0, size: 35, color: '#f97316', count: 5},
        {tier: 3, name: "沙漠石傀儡", hp: 100, speed: 2.0, size: 45, color: '#eab308', count: 5},
        {tier: 4, name: "劇毒史萊姆", hp: 200, speed: 3.0, size: 55, color: '#84cc16', count: 3},
        {tier: 5, name: "末影領主", hp: 500, speed: 4.0, size: 80, color: '#a855f7', count: 1}
    ];

    let player = { hp: 100, maxHp: 100, weaponLevel: 0, lastFireTime: 0 };
    let monsterQueue = [];
    let entities = []; // 存儲所有 3D 物件 (怪物, 子彈, 寶箱)

    // --- 3D 輔助函數 ---
    function createCube(x, y, z, size, color) {
        const cube = document.createElement('div');
        cube.className = 'cube';
        cube.style.width = size + 'px';
        cube.style.height = size + 'px';
        cube.style.setProperty('--half-size', size / 2 + 'px');
        
        // 設置顏色 (可以為不同面設置不同顏色來增加立體感)
        const mainColor = color;
        const darkColor = adjustColor(color, -40);
        const lightColor = adjustColor(color, 40);

        const faces = ['front', 'back', 'right', 'left', 'top', 'bottom'];
        faces.forEach(faceClass => {
            const face = document.createElement('div');
            face.className = `face ${faceClass}`;
            // 簡單的光照模擬
            if (faceClass === 'top') face.style.backgroundColor = lightColor;
            else if (faceClass === 'bottom') face.style.backgroundColor = darkColor;
            else if (faceClass === 'front' || faceClass === 'right') face.style.backgroundColor = mainColor;
            else face.style.backgroundColor = darkColor;
            cube.appendChild(face);
        });
        
        // 初始位置
        updateEntityTransform(cube, x, y, z, 0);
        world.appendChild(cube);
        return cube;
    }

    function updateEntityTransform(element, x, y, z, yaw) {
        // CSS 3D 坐標系: X右, Y下, Z前. 我們的邏輯: X右, Y上(負值), Z前.
        // 需要反轉 Y 軸並應用旋轉
        element.style.transform = `translate3d(${x}px, ${y}px, ${z}px) rotateY(${yaw}rad)`;
    }
    
    // 顏色調整輔助
    function adjustColor(color, amount) {
        let col = color.substring(1);
        let num = parseInt(col, 16);
        let r = (num >> 16) + amount; r = r > 255 ? 255 : r < 0 ? 0 : r;
        let b = ((num >> 8) & 0x00FF) + amount; b = b > 255 ? 255 : b < 0 ? 0 : b;
        let g = (num & 0x0000FF) + amount; g = g > 255 ? 255 : g < 0 ? 0 : g;
        return "#" + (g | (b << 8) | (r << 16)).toString(16).padStart(6, '0');
    }

    // --- 遊戲初始化與控制 ---
    function initGame() {
        monsterQueue = [];
        monsterData.forEach(data => {
            for(let i=0; i<data.count; i++) monsterQueue.push({...data});
        });
        player.hp = 100; player.weaponLevel = 0; entities = []; enemiesKilled = 0; totalMonstersSpawned = 0;
        camera = { x: 0, y: -100, z: 0, pitch: 0, yaw: 0 };
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-over-screen').style.display = 'none';
        updateHUD();
    }

    function startGame() {
        gameContainer.requestPointerLock();
    }
    
    function resetGame() {
        // 清除所有實體 DOM
        entities.forEach(e => world.removeChild(e.el));
        initGame();
        gameState = 'PLAYING';
        startGame();
    }

    document.addEventListener('pointerlockchange', () => {
        isPointerLocked = document.pointerLockElement === gameContainer;
        if (isPointerLocked) {
            if (gameState === 'START') { gameState = 'PLAYING'; initGame(); }
        } else {
             // 可以暫停遊戲或顯示菜單
        }
    });

    document.addEventListener('mousemove', (e) => {
        if (!isPointerLocked || gameState !== 'PLAYING') return;
        camera.yaw -= e.movementX * 0.002;
        camera.pitch -= e.movementY * 0.002;
        // 限制俯仰角
        camera.pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, camera.pitch));
    });

    document.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
    document.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
    document.addEventListener('mousedown', () => { if (gameState === 'PLAYING') isShooting = true; });
    document.addEventListener('mouseup', () => isShooting = false);

    // --- 遊戲邏輯 ---
    function spawnEnemy() {
        if (monsterQueue.length === 0) return;
        const data = monsterQueue.shift();
        totalMonstersSpawned++;
        // 在玩家周圍隨機生成
        const angle = Math.random() * Math.PI * 2;
        const dist = 800 + Math.random() * 400;
        const x = camera.x + Math.cos(angle) * dist;
        const z = camera.z + Math.sin(angle) * dist;
        // 怪物由兩個方塊組成: 身體和頭
        const bodySize = data.size;
        const body = createCube(x, -bodySize/2, z, bodySize, data.color);
        // 頭部顏色稍微不同
        const headSize = bodySize * 0.8;
        const headColor = adjustColor(data.color, 30);
        const head = createCube(0, -bodySize - headSize/2, 0, headSize, headColor);
        body.appendChild(head); // 將頭作為身體的子元素

        entities.push({
            type: 'enemy', el: body, x, y: -bodySize/2, z, yaw: 0,
            data: { ...data, maxHp: data.hp }, radius: bodySize/2
        });
    }

    function spawnLootBox() {
        const angle = Math.random() * Math.PI * 2;
        const dist = 300 + Math.random() * 300;
        const x = camera.x + Math.cos(angle) * dist;
        const z = camera.z + Math.sin(angle) * dist;
        const size = 40;
        const box = createCube(x, -size/2, z, size, '#f59e0b'); // 金色寶箱
        // 給寶箱加個蓋子顏色
        box.querySelector('.top').style.backgroundColor = '#fbbf24';
        entities.push({
            type: 'lootbox', el: box, x, y: -size/2, z, radius: size/2, spawnTime: globalTime
        });
    }

    function fire() {
        const weapon = WEAPONS[player.weaponLevel];
        if (globalTime - player.lastFireTime < weapon.fireRate) return;
        player.lastFireTime = globalTime;
        weaponRecoil = 15; // 增加後坐力視覺效果

        // 集中彈幕
        for(let i=0; i<weapon.bullets; i++) {
            const speed = 30 + i * 2; // 速度遞增拉開距離
            // 輕微隨機偏移
            const yawOffset = (Math.random() - 0.5) * 0.02;
            const pitchOffset = (Math.random() - 0.5) * 0.02;
            
            const vx = -Math.sin(camera.yaw + yawOffset) * Math.cos(camera.pitch + pitchOffset) * speed;
            const vy = Math.sin(camera.pitch + pitchOffset) * speed; // Y軸向上是負
            const vz = -Math.cos(camera.yaw + yawOffset) * Math.cos(camera.pitch + pitchOffset) * speed;

            // 子彈是小的發光立方體
            const bulletSize = 8 + weapon.level;
            const bullet = createCube(camera.x, camera.y + 20, camera.z, bulletSize, weapon.color);
            // 讓子彈發光
            Array.from(bullet.children).forEach(face => face.style.boxShadow = `0 0 10px ${weapon.color}`);
            
            entities.push({
                type: 'bullet', el: bullet, x: camera.x, y: camera.y+20, z: camera.z, 
                vx, vy, vz, damage: weapon.damage, radius: bulletSize/2
            });
        }
    }

    function checkCollision(e1, e2) {
        // 簡單的 3D 球體/圓柱體碰撞 (忽略 Y 軸高度差，簡化計算)
        const dx = e1.x - e2.x;
        const dz = e1.z - e2.z;
        const dist = Math.sqrt(dx*dx + dz*dz);
        return dist < (e1.radius + e2.radius);
    }

    // --- 數學題邏輯 ---
    let mathTimer = 0;
    let currentMath = {};
    function startMath() {
        gameState = 'MATH';
        document.getElementById('math-screen').style.display = 'flex';
        document.exitPointerLock();
        
        let maxVal = 10 + (player.weaponLevel * 10); if (maxVal > 90) maxVal = 90;
        const n1 = Math.floor(Math.random()*maxVal)+5; const n2 = Math.floor(Math.random()*maxVal)+5;
        if(Math.random()>0.5) { currentMath = {q: `${n1} + ${n2}`, a: n1+n2}; }
        else { const max=Math.max(n1,n2),min=Math.min(n1,n2); currentMath = {q: `${max} - ${min}`, a: max-min}; }
        
        document.getElementById('math-question').textContent = currentMath.q + " = ?";
        currentMath.input = '';
        document.getElementById('math-input').textContent = '_';
        mathTimer = 600; // 10秒
    }

    function updateMath() {
        mathTimer--;
        document.getElementById('math-timer-fill').style.width = (mathTimer/600*100) + '%';
        if (mathTimer <= 0) endMath(false);
    }
    
    function endMath(success) {
        document.getElementById('math-screen').style.display = 'none';
        if (success) {
            if (player.weaponLevel < WEAPONS.length - 1) player.weaponLevel++;
            player.hp = Math.min(player.maxHp, player.hp + 50);
            updateHUD();
        }
        gameState = 'PLAYING';
        startGame();
    }
    
    document.addEventListener('keydown', (e) => {
        if (gameState !== 'MATH') return;
        if (e.key >= '0' && e.key <= '9') {
            currentMath.input += e.key;
            document.getElementById('math-input').textContent = currentMath.input;
        } else if (e.key === 'Backspace') {
            currentMath.input = currentMath.input.slice(0, -1);
            document.getElementById('math-input').textContent = currentMath.input || '_';
        } else if (e.key === 'Enter') {
            endMath(parseInt(currentMath.input) === currentMath.a);
        }
    });

    // --- 主循環 ---
    function update() {
        globalTime++;

        if (gameState === 'MATH') { updateMath(); return; }
        if (gameState !== 'PLAYING') return;

        // 生成
        if (globalTime % 300 === 0) spawnLootBox();
        if (monsterQueue.length > 0 && (entities.filter(e=>e.type==='enemy').length < 5 || globalTime % 200 === 0)) spawnEnemy();

        // 玩家移動
        const speed = WEAPONS[player.weaponLevel].playerSpeed * 1.5; // 稍微調整基礎速度
        let dx = 0, dz = 0;
        if (keys.w) dz -= speed; if (keys.s) dz += speed;
        if (keys.a) dx -= speed; if (keys.d) dx += speed;
        
        if (dx !== 0 || dz !== 0) {
            const angle = Math.atan2(dx, dz);
            const moveAngle = camera.yaw + angle;
            camera.x += Math.sin(moveAngle) * speed;
            camera.z += Math.cos(moveAngle) * speed;
        }

        // 射擊與後坐力
        if (isShooting) fire();
        if (weaponRecoil > 0) weaponRecoil *= 0.8;

        // 更新所有實體
        for (let i = entities.length - 1; i >= 0; i--) {
            const e = entities[i];
            if (e.type === 'enemy') {
                // 怪物看向玩家並移動
                const dx = camera.x - e.x; const dz = camera.z - e.z;
                e.yaw = Math.atan2(dx, dz);
                e.x += Math.sin(e.yaw) * e.data.speed;
                e.z += Math.cos(e.yaw) * e.data.speed;
                // 簡單的跳躍動畫
                e.y = -e.data.size/2 - Math.abs(Math.sin(globalTime * 0.1 * e.data.speed)) * 10;
                updateEntityTransform(e.el, e.x, e.y, e.z, e.yaw);

                if (checkCollision(e, {x:camera.x, z:camera.z, radius: 30})) {
                    player.hp -= (10 + e.data.tier * 5);
                    updateHUD();
                    // 碰撞後後退
                    e.x -= Math.sin(e.yaw) * 50; e.z -= Math.cos(e.yaw) * 50;
                    if (player.hp <= 0) gameOver(false);
                }
            }
            else if (e.type === 'bullet') {
                e.x += e.vx; e.y -= e.vy; e.z += e.vz; // 注意 Y 軸方向
                updateEntityTransform(e.el, e.x, e.y, e.z, Math.atan2(e.vx, e.vz));
                if (e.y > 0 || Math.abs(e.x-camera.x) > 2000 || Math.abs(e.z-camera.z) > 2000) {
                    world.removeChild(e.el); entities.splice(i, 1); continue;
                }
                // 子彈與怪物碰撞
                for (let j = entities.length - 1; j >= 0; j--) {
                    const target = entities[j];
                    if (target.type === 'enemy' && checkCollision(e, target)) {
                        target.data.hp -= e.damage;
                        // 簡單的受擊變色反饋
                        target.el.childNodes.forEach(face => face.style.backgroundColor = 'white');
                        setTimeout(() => {
                            const mainColor = target.data.color;
                            const darkColor = adjustColor(mainColor, -40);
                            const lightColor = adjustColor(mainColor, 40);
                            target.el.childNodes.forEach(face => {
                                if (face.classList.contains('top')) face.style.backgroundColor = lightColor;
                                else if (face.classList.contains('bottom')) face.style.backgroundColor = darkColor;
                                else if (face.classList.contains('front') || face.classList.contains('right')) face.style.backgroundColor = mainColor;
                                else face.style.backgroundColor = darkColor;
                            });
                        }, 50);

                        world.removeChild(e.el); entities.splice(i, 1); // 子彈消失

                        if (target.data.hp <= 0) {
                            world.removeChild(target.el); entities.splice(j, 1);
                            enemiesKilled++; updateHUD();
                            if (enemiesKilled >= TOTAL_MONSTERS) gameOver(true);
                        }
                        break; // 一顆子彈只打一個怪
                    }
                }
            }
            else if (e.type === 'lootbox') {
                e.el.style.transform = `translate3d(${e.x}px, ${e.y}px, ${e.z}px) rotateY(${globalTime*0.02}rad)`;
                if (globalTime - e.spawnTime > 600) { world.removeChild(e.el); entities.splice(i, 1); continue; }
                if (checkCollision(e, {x:camera.x, z:camera.z, radius: 30})) {
                    world.removeChild(e.el); entities.splice(i, 1);
                    startMath();
                }
            }
        }
    }

    function updateHUD() {
        hpBar.style.width = (player.hp / player.maxHp * 100) + '%';
        weaponInfo.textContent = WEAPONS[player.weaponLevel].name;
        scoreInfo.textContent = `任務進度: ${enemiesKilled} / ${TOTAL_MONSTERS}`;
        weaponInfo.style.color = WEAPONS[player.weaponLevel].color;
    }

    function gameOver(victory) {
        gameState = 'GAMEOVER';
        document.exitPointerLock();
        const screen = document.getElementById('game-over-screen');
        screen.style.display = 'flex';
        document.getElementById('go-title').textContent = victory ? '任務完成！' : '行動失敗';
        document.getElementById('go-title').style.color = victory ? '#fbbf24' : '#ef4444';
        document.getElementById('go-stats').textContent = `最終擊殺: ${enemiesKilled} / ${TOTAL_MONSTERS} | 神器: ${WEAPONS[player.weaponLevel].name}`;
    }

    function render() {
        // 更新攝像機視角
        // 我們移動的是世界，而不是攝像機。世界相對於攝像機做反向移動和旋轉。
        // 先旋轉 (Yaw, Pitch)，再反向移動 (Translate)
        const pitchDeg = camera.pitch * (180 / Math.PI);
        const yawDeg = camera.yaw * (180 / Math.PI);
        world.style.transform = `rotateX(${-pitchDeg}deg) rotateY(${-yawDeg}deg) translate3d(${-camera.x}px, ${-camera.y}px, ${-camera.z}px)`;

        // 更新武器模型位置 (跟隨攝像機並帶有後坐力動畫)
        const recoilZ = weaponRecoil * 2;
        const recoilY = weaponRecoil * 0.5;
        // 武器始終在屏幕右下角，不受世界變換影響，但受後坐力影響
        playerWeapon.style.transform = `rotateX(${recoilY}deg) translateZ(${recoilZ}px)`;
        
        // 更新武器顏色
        const wepColor = WEAPONS[player.weaponLevel].color;
        playerWeapon.querySelector('.face.front').style.backgroundColor = wepColor;
        playerWeapon.querySelector('.face.front').style.boxShadow = `0 0 15px ${wepColor}`;
        Array.from(playerWeapon.children).forEach(f => {
            if(!f.classList.contains('front')) f.style.backgroundColor = adjustColor(wepColor, -100);
        })

    }

    function gameLoop() {
        update();
        render();
        requestAnimationFrame(gameLoop);
    }

    initGame();
    gameLoop();

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Survival - V38</title>
    
    <!-- 1. 指向 css 資料夾 -->
    <link rel="stylesheet" href="css/style.css">

    <!-- 引入 MathJax 處理 LaTeX 數學排版 -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        /* 載入畫面樣式，確保永遠在最上層 */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; color: #fbbf24; display: flex;
            align-items: center; justify-content: center; z-index: 9999;
            font-family: Arial, sans-serif; font-size: 24px; font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- 2. 音效資源 (檔名嚴格對應：shootsSfx.m4a) -->
    <audio id="bgm" src="audio/bgm.mp3" loop preload="auto"></audio>
    <audio id="shootSfx" src="audio/shootsSfx.m4a" preload="auto"></audio>
    <audio id="reloadSfx" src="audio/reloadSfx.m4a" preload="auto"></audio>
    <audio id="emptyAmmoSfx" src="audio/emptyAmmoSfx.m4a" preload="auto"></audio>

    <!-- 載入中遮罩 -->
    <div id="loading-screen">連接伺服器中，請稍候...</div>
    
    <!-- 難度選擇選單 (初始隱藏，由 JS 開啟) -->
    <div id="start-menu" style="display: none;">
        <h1 style="color: #fbbf24; font-size: 40px; margin-bottom: 30px; text-shadow: 2px 2px 4px #000; text-align: center;">請選擇目標等級</h1>
        <button class="diff-btn" onclick="window.initAudio(); window.startGame('S1')">S1 程度</button>
        <button class="diff-btn" onclick="window.initAudio(); window.startGame('S2')">S2 程度</button>
        <button class="diff-btn" onclick="window.initAudio(); window.startGame('S3')">S3 程度</button>
    </div>

    <!-- MCQ 答題視窗 -->
    <div id="math-overlay">
        <div id="math-container" class="math-container">
            <h2 id="math-header" style="margin-top: 0;"></h2>
            <div id="math-timer-bg"><div id="math-timer-bar"></div></div>
            <div id="math-question-content"></div>
            <div class="mcq-options" id="math-options-container"></div>
        </div>
    </div>

    <!-- 遊戲畫布 -->
    <canvas id="gameCanvas"></canvas>

    <!-- 左側 UI 容器 -->
    <div id="ui-container">
        <!-- 玩家資訊、怪物計數區塊 (保持不變) -->
        <div class="ui-box">
            <div class="player-info-wrapper">
                <canvas id="player-icon" width="45" height="45"></canvas>
                <div style="flex:1;">
                    <div id="hp-bar-bg"><div id="ui-hp-fill"></div></div>
                    <div class="black-text" id="ui-hp-text">HP: 100</div>
                    <div class="black-text" id="ui-wep-name">武裝: 尚未裝備</div>
                    <div class="black-text" id="ui-ammo-text">彈藥: 0/0</div>
                </div>
            </div>
        </div>

        <div class="ui-box">
            <div style="text-align:center; color:#000; font-weight:bold; font-size:12px; margin-bottom:5px;">剩餘魔物目標</div>
            <div class="monster-row"><canvas id="m-icon-1" width="24" height="24"></canvas><span class="monster-count" id="m-count-1">x 0</span></div>
            <div class="monster-row"><canvas id="m-icon-2" width="24" height="24"></canvas><span class="monster-count" id="m-count-2">x 0</span></div>
            <div class="monster-row"><canvas id="m-icon-3" width="24" height="24"></canvas><span class="monster-count" id="m-count-3">x 0</span></div>
            <div class="monster-row"><canvas id="m-icon-4" width="24" height="24"></canvas><span class="monster-count" id="m-count-4">x 0</span></div>
            <div class="monster-row"><canvas id="m-icon-5" width="24" height="24"></canvas><span class="monster-count" id="m-count-5">x 0</span></div>
        </div>

        <div class="ui-box" id="leaderboard-box">
            <h3>🏆 總排行榜 🏆</h3>
            <ol id="leaderboard-list"><li>載入中...</li></ol>
            <div id="submit-form">
                <input type="text" id="lb-class" placeholder="班別">
                <input type="text" id="lb-sid" placeholder="學號">
                <input type="text" id="lb-name" placeholder="名字">
                <div style="display: flex; gap: 5px; width: 90%; justify-content: center; margin-top: 5px;">
                    <button onclick="window.submitScore()" style="flex: 1;">上傳</button>
                    <button onclick="window.showStartMenu()" style="flex: 1; background: #64748b;">重玩</button>
                </div>
            </div>
        </div>

        <!-- 版本號 (升級至 V38) -->
        <div style="color: rgba(255, 255, 255, 0.5); font-weight: bold; font-size: 14px; margin-top: auto; padding-left: 5px;">V38</div>
    </div>

    <!-- 3. 腳本引入順序 (路徑已按截圖修正) -->
    <script src="js/topics/indices.js"></script> 
    <script src="js/config.js"></script>  
    <script src="js/ui.js"></script>      
    <script src="js/engine.js"></script>  

    <script>
        // 🚀 V38 終極防卡死計時器 (Fail-safe Timer)
        // 如果因為任何原因腳本沒跑完，3秒後強制開啟遊戲介面
        setTimeout(() => {
            const loader = document.getElementById('loading-screen');
            const menu = document.getElementById('start-menu');
            if (loader && loader.style.display !== 'none') {
                console.warn("[V38] 檢測到載入異常，啟動安全恢復模式...");
                loader.style.display = 'none';
                menu.style.display = 'flex';
                // 嘗試將遊戲狀態設為選單，防止邏輯卡死
                if (typeof gameState !== 'undefined') {
                    gameState = 'START_MENU';
                }
            }
        }, 3000); 
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Survival - Boss Alarm & Ammo Box V23</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0f172a; 
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* 鎖定螢幕，防止滑動同縮放 */
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #1e293b; display: flex; justify-content: center; align-items: center;
            color: #fbbf24; font-size: 32px; font-weight: bold; z-index: 1000;
        }
    </style>
</head>
<body>

    <!-- 音效設定：請在此處填入你 GitHub 的聲音連結 -->
    <audio id="bgm" src="bgm.mp3" loop></audio>
    <audio id="shootSfx" src="shootSfx.m4a"></audio>
    <audio id="reloadSfx" src="reloadSfx.m4a"></audio>

    <div id="loading-screen">連接伺服器並載入數據中...</div>
    <canvas id="gameCanvas"></canvas>

<script>
    // ==========================================
    // 🌐 Google Apps Script (GAS) 後台設定區
    // ==========================================
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyhAYaMKRTbD_VyHDe-MZZ5OBZVdsvY2l9qcKWq8TuliBKptbhLpQsHbc4wdyKmX24Cvg/exec"; 
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // --- 聲音初始化機制 ---
    let audioInitialized = false;
    function initAudio() {
        if (!audioInitialized) {
            let bgm = document.getElementById('bgm');
            bgm.volume = 0.4;
            bgm.play().catch(e => console.log("BGM 自動播放被阻擋，需等待互動"));
            audioInitialized = true;
        }
    }

    // --- 控制系統變數 ---
    let leftJoyBase = { x: 120, y: 120 }; 
    let leftJoy = { active: false, id: null, stick: {x:0, y:0}, dir: {x:0, y:0} };
    let rightJoy = { active: false, id: null, base: {x:0,y:0}, stick: {x:0,y:0}, dir: {x:0,y:0}, angle: 0 };
    const joyRadius = 55;

    const keys = { w: false, a: false, s: false, d: false };
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let isShooting = false;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        leftJoyBase = { x: 120, y: canvas.height - 120 };
        leftJoy.stick = { x: leftJoyBase.x, y: leftJoyBase.y };
        setupNumpad();
    }
    window.addEventListener('resize', resizeCanvas);

    let gameState = 'PLAYING';
    let globalTime = 0;
    let shakeTime = 0;
    let bossAlarmTimer = 0; // Boss 警報計時器
    
    // --- 遊戲進程與生成系統 ---
    let enemiesKilled = 0;
    let totalMonstersSpawned = 0;
    let TOTAL_MONSTERS = 19; 
    let monstersLeft = [0, 0, 0, 0, 0, 0]; // 記錄 1-5 級怪物剩餘數量
    
    // --- 怪物與武器基礎設定 ---
    let MONSTER_BASE = [
        {tier: 1, name: "一級怪物", count: 5, hp: 8, speed: 0.5, size: 22, color: '#ef4444'},
        {tier: 2, name: "二級怪物", count: 5, hp: 25, speed: 0.8, size: 28, color: '#f97316'},
        {tier: 3, name: "三級怪物", count: 5, hp: 200, speed: 1.0, size: 35, color: '#eab308'},
        {tier: 4, name: "四級怪物", count: 3, hp: 500, speed: 1.2, size: 45, color: '#84cc16'},
        {tier: 5, name: "五級首領", count: 1, hp: 1500, speed: 1.5, size: 70, color: '#a855f7'}
    ];

    const WEAPONS = [
        { level: 1, name: "Lv.1 基礎手槍", damage: 1, bullets: 1, fireRate: 15, playerSpeed: 4, reloadAmmo: 30, color: '#fde047', glow: '#ca8a04', recoil: 4, speed: 12 },
        { level: 2, name: "Lv.2 雙發衝鋒", damage: 1.5, bullets: 2, fireRate: 12, playerSpeed: 5, reloadAmmo: 30, color: '#60a5fa', glow: '#2563eb', recoil: 5, speed: 14 },
        { level: 3, name: "Lv.3 散彈速射", damage: 2.25, bullets: 3, fireRate: 10, playerSpeed: 6, reloadAmmo: 40, color: '#34d399', glow: '#059669', recoil: 6, speed: 16 },
        { level: 4, name: "Lv.4 脈衝步槍", damage: 3.4, bullets: 4, fireRate: 8, playerSpeed: 7, reloadAmmo: 40, color: '#f472b6', glow: '#db2777', recoil: 7, speed: 18 },
        { level: 5, name: "Lv.5 穿甲重砲", damage: 5.1, bullets: 1, fireRate: 6, playerSpeed: 8, reloadAmmo: 50, color: '#a78bfa', glow: '#7c3aed', recoil: 8, speed: 20, penetrate: true },
        { level: 6, name: "Lv.6 散射激光", damage: 7.6, bullets: 5, fireRate: 4, playerSpeed: 9, reloadAmmo: 50, color: '#fb923c', glow: '#ea580c', recoil: 10, speed: 22 },
        { level: 7, name: "Lv.7 電漿風暴", damage: 11.4, bullets: 3, fireRate: 3, playerSpeed: 10, reloadAmmo: 60, color: '#38bdf8', glow: '#0284c7', recoil: 12, speed: 25, penetrate: true },
        { level: 8, name: "Lv.8 終極殲滅射線", damage: 17.1, bullets: 7, fireRate: 2, playerSpeed: 10, reloadAmmo: 60, color: '#ffffff', glow: '#fef08a', recoil: 14, speed: 28, penetrate: true },
        { level: 9, name: "Lv.MAX 神話武器", damage: 25.6, bullets: 9, fireRate: 1, playerSpeed: 10, reloadAmmo: 100, color: '#ef4444', glow: '#b91c1c', recoil: 16, speed: 30, penetrate: true }
    ];

    let monsterQueue = [];
    function initMonsterQueue() {
        monsterQueue = [];
        TOTAL_MONSTERS = 0;
        monstersLeft = [0, 0, 0, 0, 0, 0];
        for (let m of MONSTER_BASE) {
            for(let i=0; i<m.count; i++) {
                monsterQueue.push({...m});
            }
            TOTAL_MONSTERS += m.count;
            monstersLeft[m.tier] += m.count; // 記錄數量
        }
    }

    // --- 玩家狀態 ---
    let player = {
        x: 0, y: 0, radius: 20, color: '#3b82f6', speed: 4, hp: 100, maxHp: 100,
        weaponLevel: 0, 
        currentMagazine: 30, 
        totalAmmo: 30,       
        isReloading: false, reloadTimer: 0,
        angle: 0, recoilOffset: 0, lastFireTime: 0, isMoving: false
    };

    let bullets = []; let enemies = []; let lootBoxes = []; let ammoBoxes = []; let particles = []; let floatingTexts = [];
    let currentMath = { question: '', answer: 0, userInput: '', message: '', messageColor: 'white', scale: 0, type: 'UPGRADE' };
    let mathTimer = 0;

    let numpadButtons = [];
    function setupNumpad() {
        numpadButtons = [];
        const bw = window.innerWidth > 600 ? 80 : 65; 
        const bh = window.innerWidth > 600 ? 60 : 50;
        const gap = 10;
        const startX = canvas.width/2 - (bw*3 + gap*2)/2;
        const startY = canvas.height/2 + 20;

        const keys = [['7','8','9'], ['4','5','6'], ['1','2','3'], ['Del','0','Enter']];
        for(let r=0; r<4; r++) {
            for(let c=0; c<3; c++) {
                numpadButtons.push({ label: keys[r][c], x: startX + c * (bw + gap), y: startY + r * (bh + gap), w: bw, h: bh });
            }
        }
    }
    resizeCanvas();

    // --- 事件處理 ---
    canvas.addEventListener('touchstart', handleTouchStart, {passive: false});
    canvas.addEventListener('touchmove', handleTouchMove, {passive: false});
    canvas.addEventListener('touchend', handleTouchEnd, {passive: false});
    canvas.addEventListener('touchcancel', handleTouchEnd, {passive: false});

    function handleTouchStart(e) {
        e.preventDefault();
        initAudio();
        const touches = e.changedTouches;

        for (let i = 0; i < touches.length; i++) {
            let t = touches[i];
            
            if (gameState === 'MATH_TIME') {
                for (let btn of numpadButtons) {
                    if (t.clientX >= btn.x && t.clientX <= btn.x + btn.w && t.clientY >= btn.y && t.clientY <= btn.y + btn.h) {
                        handleNumpadInput(btn.label); break;
                    }
                }
                continue;
            }

            if (gameState === 'GAME_OVER' || gameState === 'VICTORY') { resetGame(); return; }

            if (gameState === 'PLAYING') {
                if (t.clientX < canvas.width / 2 && !leftJoy.active) {
                    leftJoy.active = true; leftJoy.id = t.identifier;
                    updateFixedJoystick(leftJoy, t.clientX, t.clientY);
                } 
                else if (t.clientX >= canvas.width / 2 && !rightJoy.active) {
                    rightJoy.active = true; rightJoy.id = t.identifier;
                    rightJoy.base = {x: t.clientX, y: t.clientY};
                    rightJoy.stick = {x: t.clientX, y: t.clientY};
                    player.angle = Math.atan2(0, 1);
                }
            }
        }
    }

    function handleTouchMove(e) {
        e.preventDefault();
        const touches = e.changedTouches;
        for (let i = 0; i < touches.length; i++) {
            let t = touches[i];
            if (leftJoy.active && t.identifier === leftJoy.id) updateFixedJoystick(leftJoy, t.clientX, t.clientY);
            if (rightJoy.active && t.identifier === rightJoy.id) {
                let dx = t.clientX - rightJoy.base.x; let dy = t.clientY - rightJoy.base.y;
                let dist = Math.sqrt(dx*dx + dy*dy); rightJoy.angle = Math.atan2(dy, dx);
                if (dist > joyRadius) {
                    rightJoy.stick.x = rightJoy.base.x + Math.cos(rightJoy.angle) * joyRadius;
                    rightJoy.stick.y = rightJoy.base.y + Math.sin(rightJoy.angle) * joyRadius;
                    rightJoy.dir.x = Math.cos(rightJoy.angle); rightJoy.dir.y = Math.sin(rightJoy.angle);
                } else {
                    rightJoy.stick.x = t.clientX; rightJoy.stick.y = t.clientY;
                    rightJoy.dir.x = dx / joyRadius; rightJoy.dir.y = dy / joyRadius;
                }
                player.angle = rightJoy.angle;
            }
        }
    }

    function handleTouchEnd(e) {
        e.preventDefault();
        const touches = e.changedTouches;
        for (let i = 0; i < touches.length; i++) {
            let t = touches[i];
            if (leftJoy.active && t.identifier === leftJoy.id) { leftJoy.active = false; leftJoy.dir = {x:0, y:0}; leftJoy.stick = {x: leftJoyBase.x, y: leftJoyBase.y}; }
            if (rightJoy.active && t.identifier === rightJoy.id) { rightJoy.active = false; rightJoy.dir = {x:0, y:0}; }
        }
    }

    function updateFixedJoystick(joy, tx, ty) {
        let dx = tx - leftJoyBase.x; let dy = ty - leftJoyBase.y;
        let dist = Math.sqrt(dx*dx + dy*dy); let angle = Math.atan2(dy, dx);
        if (dist > joyRadius) {
            joy.stick.x = leftJoyBase.x + Math.cos(angle) * joyRadius; joy.stick.y = leftJoyBase.y + Math.sin(angle) * joyRadius; joy.dir.x = Math.cos(angle); joy.dir.y = Math.sin(angle);
        } else {
            joy.stick.x = tx; joy.stick.y = ty; joy.dir.x = dx / joyRadius; joy.dir.y = dy / joyRadius;
        }
    }

    window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
    window.addEventListener('mousedown', (e) => {
        initAudio();
        if (gameState === 'MATH_TIME') {
            for (let btn of numpadButtons) {
                if (e.clientX >= btn.x && e.clientX <= btn.x + btn.w && e.clientY >= btn.y && e.clientY <= btn.y + btn.h) { handleNumpadInput(btn.label); break; }
            }
        } else if (gameState === 'GAME_OVER' || gameState === 'VICTORY') resetGame(); 
        else if (gameState === 'PLAYING') isShooting = true;
    });
    window.addEventListener('mouseup', () => { isShooting = false; });
    window.addEventListener('keydown', (e) => {
        initAudio();
        if (gameState === 'PLAYING') { let key = e.key.toLowerCase(); if (keys.hasOwnProperty(key)) keys[key] = true; } 
        else if (gameState === 'MATH_TIME') {
            if (!isNaN(e.key) && e.key !== ' ') { if (currentMath.userInput.length < 5) currentMath.userInput += e.key; } 
            else if (e.key === 'Backspace') currentMath.userInput = currentMath.userInput.slice(0, -1); 
            else if (e.key === 'Enter' || e.key === 'NumpadEnter') checkMathAnswer();
        } else if (gameState === 'GAME_OVER' || gameState === 'VICTORY') { if (e.key === 'Enter') resetGame(); }
    });
    window.addEventListener('keyup', (e) => { if (gameState === 'PLAYING') { let key = e.key.toLowerCase(); if (keys.hasOwnProperty(key)) keys[key] = false; }});

    function handleNumpadInput(val) {
        if (val === 'Del') currentMath.userInput = currentMath.userInput.slice(0, -1);
        else if (val === 'Enter') checkMathAnswer();
        else { if (currentMath.userInput.length < 5) currentMath.userInput += val; }
    }

    // --- 遊戲邏輯函數 ---
    function fireBullet(angle, weapon, customSpeed) {
        bullets.push({
            x: player.x + Math.cos(player.angle) * 30, 
            y: player.y + Math.sin(player.angle) * 30, 
            vx: Math.cos(angle) * customSpeed, 
            vy: Math.sin(angle) * customSpeed,
            radius: weapon.size || 4, color: weapon.color, glow: weapon.glow, damage: weapon.damage, penetrate: weapon.penetrate, hitEnemies: []
        });
    }

    function createParticles(x, y, color, count, speedStr = 5, z = 0, decay = null) {
        for (let i = 0; i < count; i++) {
            particles.push({
                x: x, y: y, z: z,
                vx: (Math.random() - 0.5) * speedStr, vy: (Math.random() - 0.5) * speedStr, vz: Math.random() * speedStr,
                life: 1.0, decay: decay || (0.02 + Math.random() * 0.04), color: color, size: 2 + Math.random() * 4
            });
        }
    }

    function addFloatingText(text, x, y, color, size = 20) {
        floatingTexts.push({ text, x, y, color, size, life: 1.0, dy: -1.5 });
    }

    // 金色武器箱 (8秒降落)
    function spawnLootBox() {
        lootBoxes.push({
            x: Math.random() * (canvas.width - 200) + 100, y: Math.random() * (canvas.height - 200) + 100,
            size: 35, pulse: 0, spawnTime: globalTime 
        });
        addFloatingText("武器升級箱降落！", canvas.width/2, 150, '#eab308', 30);
    }

    // 藍色彈藥包 (每3秒出現)
    function spawnAmmoBox() {
        if (ammoBoxes.length < 3) {
            ammoBoxes.push({
                x: Math.random() * (canvas.width - 200) + 100, y: Math.random() * (canvas.height - 200) + 100,
                size: 28, pulse: 0, spawnTime: globalTime 
            });
            addFloatingText("彈藥補給包降落！", canvas.width/2, 120, '#38bdf8', 26);
        }
    }

    function spawnEnemy() {
        if (gameState !== 'PLAYING' || monsterQueue.length === 0) return;
        let mData = monsterQueue.shift(); totalMonstersSpawned++;
        let x, y;
        if (Math.random() < 0.5) { x = Math.random() < 0.5 ? -100 : canvas.width + 100; y = Math.random() * canvas.height; } 
        else { x = Math.random() * canvas.width; y = Math.random() < 0.5 ? -100 : canvas.height + 100; }

        enemies.push({ 
            x: x, y: y, size: mData.size, color: mData.color, speed: mData.speed, 
            hp: mData.hp, maxHp: mData.hp, tier: mData.tier, name: mData.name, bobPhase: Math.random() * Math.PI * 2 
        });
        
        if (mData.tier === 5) {
            bossAlarmTimer = 120;
            addFloatingText("⚠️ 萬血首領來襲！ ⚠️", canvas.width/2, 100, '#ef4444', 50);
            createParticles(canvas.width/2, 100, '#ef4444', 50, 10);
        }
    }

    function generateMath() {
        let maxVal = 10 + (player.weaponLevel * 10); if (maxVal > 90) maxVal = 90; 
        const num1 = Math.floor(Math.random() * maxVal) + 5; const num2 = Math.floor(Math.random() * maxVal) + 5;
        if (Math.random() > 0.5) { currentMath.question = `${num1} + ${num2} = ?`; currentMath.answer = num1 + num2; } 
        else { let max = Math.max(num1, num2), min = Math.min(num1, num2); currentMath.question = `${max} - ${min} = ?`; currentMath.answer = max - min; }
        
        currentMath.userInput = ''; currentMath.message = '快！請在 10 秒內作答！'; currentMath.messageColor = '#fbbf24'; currentMath.scale = 0; mathTimer = 600; 
    }

    function checkMathAnswer() {
        if (currentMath.userInput === '') return;
        if (parseInt(currentMath.userInput) === currentMath.answer) {
            
            if (currentMath.type === 'UPGRADE') {
                if (player.weaponLevel < WEAPONS.length - 1) {
                    player.weaponLevel++;
                    addFloatingText(`解鎖: ${WEAPONS[player.weaponLevel].name}!`, canvas.width/2, canvas.height/4, '#fbbf24', 35);
                    player.speed = WEAPONS[player.weaponLevel].playerSpeed;
                }
                let ammoToAdd = WEAPONS[player.weaponLevel].reloadAmmo || 30;
                player.totalAmmo += ammoToAdd;
                addFloatingText(`+${ammoToAdd} 總彈藥`, canvas.width/2, canvas.height/4 + 40, '#000000', 25);
                player.hp = Math.min(player.maxHp, player.hp + 50); 
                createParticles(player.x, player.y, '#4ade80', 60, 10); 
                closeMathUI(true, "✅ 武器系統進化成功！");
            } else if (currentMath.type === 'AMMO') {
                // 彈藥包只補充子彈 (固定 30 粒)
                let ammoToAdd = 30;
                player.totalAmmo += ammoToAdd;
                addFloatingText(`+${ammoToAdd} 總彈藥`, canvas.width/2, canvas.height/4 + 40, '#38bdf8', 25);
                createParticles(player.x, player.y, '#38bdf8', 50, 10); 
                closeMathUI(true, "✅ 彈藥補給成功！");
            }
            
            // 答對不顯示聲音，已移除 reloadSfx 播放
            shakeTime = 15;
            
        } else {
            // 答錯亦不顯示聲音
            closeMathUI(false, `❌ 錯誤！正確答案係 ${currentMath.answer}`);
        }
    }

    function closeMathUI(success, msg) {
        currentMath.question = msg; currentMath.userInput = ''; currentMath.message = ''; currentMath.messageColor = success ? '#4ade80' : '#f87171';
        setTimeout(() => { 
            gameState = 'PLAYING'; isShooting = false; 
            leftJoy.active = false; leftJoy.dir = {x:0, y:0}; leftJoy.stick = {x: leftJoyBase.x, y: leftJoyBase.y};
            rightJoy.active = false; rightJoy.dir = {x:0, y:0}; keys.w = keys.a = keys.s = keys.d = false; 
        }, 1000);
    }

    function resetGame() {
        player.weaponLevel = 0; player.hp = player.maxHp; 
        player.speed = WEAPONS[0].playerSpeed || 4; 
        player.currentMagazine = 30; 
        player.totalAmmo = WEAPONS[0].reloadAmmo || 30; 
        player.isReloading = false; player.reloadTimer = 0;
        
        enemiesKilled = 0; totalMonstersSpawned = 0;
        player.x = canvas.width / 2; player.y = canvas.height / 2;
        bullets = []; enemies = []; lootBoxes = []; ammoBoxes = []; particles = []; floatingTexts = [];
        isShooting = false; keys.w = keys.a = keys.s = keys.d = false;
        leftJoy.active = false; rightJoy.active = false;
        player.lastFireTime = 0; globalTime = 0; bossAlarmTimer = 0;
        initMonsterQueue(); gameState = 'PLAYING';
    }

    function checkCollision(obj1, obj2, dist) {
        let dx = obj1.x - obj2.x; let dy = obj1.y - obj2.y; return Math.sqrt(dx*dx + dy*dy) <= dist;
    }
    
    function startReload() {
        if (player.totalAmmo > 0 && player.currentMagazine < 30 && !player.isReloading) {
            player.isReloading = true;
            player.reloadTimer = 30; // 30 frames = 0.5 秒
            let rSfx = document.getElementById('reloadSfx');
            if (rSfx) { rSfx.currentTime = 0; rSfx.play().catch(e=>{}); }
            addFloatingText("Reloading...", player.x, player.y - 40, '#000000');
        }
    }

    // --- 遊戲主循環 ---
    function update() {
        globalTime++;

        if (gameState === 'MATH_TIME') {
            if (currentMath.scale < 1) currentMath.scale += 0.15;
            mathTimer--;
            if (mathTimer <= 0 && currentMath.scale >= 1) closeMathUI(false, "⏳ 時間到！寶箱已損毀。");
        }

        if (player.recoilOffset > 0) player.recoilOffset *= 0.8; 
        if (bossAlarmTimer > 0) bossAlarmTimer--;

        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].x += particles[i].vx; particles[i].y += particles[i].vy;
            particles[i].life -= particles[i].decay;
            if (particles[i].life <= 0) particles.splice(i, 1);
        }
        for (let i = floatingTexts.length - 1; i >= 0; i--) {
            floatingTexts[i].y += floatingTexts[i].dy; floatingTexts[i].life -= 0.02;
            if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
        }

        if (gameState !== 'PLAYING') return;

        if (player.isReloading) {
            player.reloadTimer--;
            if (player.reloadTimer <= 0) {
                let bulletsNeeded = 30 - player.currentMagazine;
                let bulletsToReload = Math.min(bulletsNeeded, player.totalAmmo);
                player.currentMagazine += bulletsToReload;
                player.totalAmmo -= bulletsToReload;
                player.isReloading = false;
                addFloatingText("Reloaded!", player.x, player.y - 40, '#4ade80');
            }
        }

        // 定時生成邏輯
        if (globalTime % 180 === 0) spawnAmmoBox(); // 每 3 秒空投彈藥包
        if (globalTime % 480 === 0) spawnLootBox(); // 每 8 秒固定空投武器升級箱
        
        if (monsterQueue.length > 0) { 
            if (enemies.length < 4 || globalTime % 180 === 0) spawnEnemy(); 
        }

        let dx = 0, dy = 0;
        let safeSpeed = player.speed || 4; 
        
        if (leftJoy.active) { dx = leftJoy.dir.x * safeSpeed; dy = leftJoy.dir.y * safeSpeed; } 
        else {
            if (keys.w) dy -= safeSpeed; if (keys.s) dy += safeSpeed;
            if (keys.a) dx -= safeSpeed; if (keys.d) dx += safeSpeed;
        }
        
        player.isMoving = (dx !== 0 || dy !== 0);
        if (dx !== 0 && dy !== 0 && !leftJoy.active) { 
            let len = Math.sqrt(dx*dx + dy*dy); 
            dx = (dx / len) * safeSpeed; dy = (dy / len) * safeSpeed; 
        }
        
        if (!isNaN(dx) && !isNaN(dy)) { player.x += dx; player.y += dy; }
        player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
        player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

        if (rightJoy.active) { player.angle = rightJoy.angle; } 
        else if (!('ontouchstart' in window)) { player.angle = Math.atan2(mouseY - player.y, mouseX - player.x); }

        // --- 射擊邏輯 ---
        if (isShooting || rightJoy.active) {
            const weapon = WEAPONS[player.weaponLevel];
            if (globalTime - player.lastFireTime >= weapon.fireRate) {
                if (player.currentMagazine > 0 && !player.isReloading) {
                    let sSfx = document.getElementById('shootSfx');
                    if (sSfx) { sSfx.currentTime = 0; sSfx.play().catch(e=>{}); }

                    player.currentMagazine--; 

                    for(let k=0; k<weapon.bullets; k++) {
                        let speedOffset = weapon.speed - (k * 2.5); 
                        if (speedOffset < 8) speedOffset = 8;
                        let angleOffset = player.angle + (Math.random() - 0.5) * 0.05; 
                        fireBullet(angleOffset, weapon, speedOffset);
                    }
                    
                    createParticles(player.x + Math.cos(player.angle)*30, player.y + Math.sin(player.angle)*30, weapon.color, weapon.level*2, weapon.level*1.5);
                    shakeTime = Math.max(shakeTime, 2);
                    player.recoilOffset = weapon.recoil; player.lastFireTime = globalTime;
                } else if (player.currentMagazine <= 0 && player.totalAmmo > 0 && !player.isReloading) {
                    startReload(); 
                } else if (player.currentMagazine <= 0 && player.totalAmmo <= 0 && !player.isReloading) {
                    if (globalTime % 30 === 0) addFloatingText("彈藥耗盡！尋找補給箱！", player.x, player.y - 40, '#ef4444');
                }
            }
        }

        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i]; b.x += b.vx; b.y += b.vy;
            if (Math.random() < 0.3) createParticles(b.x, b.y, b.color, 1, 1);
            if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
        }

        for (let i = enemies.length - 1; i >= 0; i--) {
            let enemy = enemies[i];
            let angleToPlayer = Math.atan2(player.y - enemy.y, player.x - enemy.x);
            enemy.angle = angleToPlayer;
            enemy.x += Math.cos(angleToPlayer) * enemy.speed; enemy.y += Math.sin(angleToPlayer) * enemy.speed;

            if (checkCollision(player, enemy, player.radius + enemy.size/2)) {
                let dmg = 10 + (enemy.tier * 5); 
                player.hp -= dmg; shakeTime = 15;
                createParticles(player.x, player.y, '#ef4444', 30, 8); 
                addFloatingText(`-${dmg}`, player.x, player.y - 50, '#ef4444', 24);
                enemy.x -= Math.cos(angleToPlayer) * 40; enemy.y -= Math.sin(angleToPlayer) * 40;
                if (player.hp <= 0) { gameState = 'GAME_OVER'; createParticles(player.x, player.y, '#ef4444', 100, 15); }
                continue;
            }

            for (let j = bullets.length - 1; j >= 0; j--) {
                let b = bullets[j];
                if (b.penetrate && b.hitEnemies.includes(enemy)) continue;

                if (checkCollision(enemy, b, enemy.size/2 + b.radius)) {
                    enemy.hp -= b.damage; 
                    createParticles(enemy.x, enemy.y, b.color, 6, 5); 
                    
                    if (b.penetrate) b.hitEnemies.push(enemy); else bullets.splice(j, 1); 

                    if (enemy.hp <= 0) {
                        createParticles(enemy.x, enemy.y, enemy.color, enemy.tier === 5 ? 100 : 40, 8); 
                        monstersLeft[enemy.tier]--; 
                        enemies.splice(i, 1); enemiesKilled++;
                        if (enemiesKilled >= TOTAL_MONSTERS) gameState = 'VICTORY';
                        break; 
                    }
                }
            }
        }

        for (let i = lootBoxes.length - 1; i >= 0; i--) {
            if (globalTime - lootBoxes[i].spawnTime > 600) {
                createParticles(lootBoxes[i].x, lootBoxes[i].y, '#94a3b8', 25, 5);
                lootBoxes.splice(i, 1); continue;
            }
            lootBoxes[i].pulse += 0.1;
            if (checkCollision(player, lootBoxes[i], player.radius + lootBoxes[i].size/2)) {
                createParticles(lootBoxes[i].x, lootBoxes[i].y, '#eab308', 40, 8);
                lootBoxes.splice(i, 1); gameState = 'MATH_TIME'; currentMath.type = 'UPGRADE'; generateMath(); isShooting = false; rightJoy.active = false; leftJoy.active = false; break;
            }
        }

        for (let i = ammoBoxes.length - 1; i >= 0; i--) {
            if (globalTime - ammoBoxes[i].spawnTime > 600) {
                createParticles(ammoBoxes[i].x, ammoBoxes[i].y, '#94a3b8', 25, 5);
                ammoBoxes.splice(i, 1); continue;
            }
            ammoBoxes[i].pulse += 0.1;
            if (checkCollision(player, ammoBoxes[i], player.radius + ammoBoxes[i].size/2)) {
                createParticles(ammoBoxes[i].x, ammoBoxes[i].y, '#38bdf8', 40, 8);
                ammoBoxes.splice(i, 1); gameState = 'MATH_TIME'; currentMath.type = 'AMMO'; generateMath(); isShooting = false; rightJoy.active = false; leftJoy.active = false; break;
            }
        }
    }

    // --- 渲染系統 (偽 2.5D 美術) ---
    function draw() {
        ctx.fillStyle = '#d2b48c'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        if (shakeTime > 0) {

            ctx.translate((Math.random() - 0.5) * mag, (Math.random() - 0.5) * mag); shakeTime--;
        }

        ctx.strokeStyle = 'rgba(139, 69, 19, 0.15)'; ctx.lineWidth = 2;

        for(let i=0; i<canvas.height; i+=80) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke(); }

                let visualY = -15 - glow;

                let visualY = -15 - glow;
                ctx.fillStyle = '#1d4ed8'; ctx.fillRect(-18, visualY - 12, 36, 24); 
                ctx.fillStyle = '#3b82f6'; ctx.fillRect(-20, visualY - 20, 40, 12);
                ctx.fillStyle = '#60a5fa'; ctx.fillRect(-5, visualY - 8, 10, 8);
                ctx.fillStyle = 'white'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center'; ctx.fillText('AMMO', 0, visualY - 25);

                let visualY = -10 - bob;

                    ctx.beginPath(); ctx.moveTo(-e.size*0.4, visualY - e.size*0.3); ctx.lineTo(e.size*0.4, visualY - e.size*0.2); ctx.stroke();
                } else if (e.tier === 4) {
                    ctx.fillStyle = '#bef264';
                    ctx.beginPath(); ctx.arc(-e.size*0.2, visualY - e.size*0.1, e.size*0.1, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(e.size*0.25, visualY - e.size*0.3, e.size*0.08, 0, Math.PI*2); ctx.fill();
                } else if (e.tier === 5) {

                    ctx.fillStyle = '#fbbf24';
                    ctx.beginPath(); ctx.moveTo(-20, visualY - e.size*0.4); ctx.lineTo(-25, visualY - e.size*0.6); ctx.lineTo(0, visualY - e.size*0.5); ctx.lineTo(25, visualY - e.size*0.6); ctx.lineTo(20, visualY - e.size*0.4); ctx.fill();
                }
                ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.stroke();
                let eyeOffsetX = isFacingRight ? e.size*0.15 : -e.size*0.15;

                ctx.beginPath(); ctx.arc(eyeOffsetX - e.size*0.15, visualY - e.size*0.3, e.size*0.08, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(eyeOffsetX + e.size*0.15, visualY - e.size*0.3, e.size*0.08, 0, Math.PI*2); ctx.fill();

                ctx.beginPath(); ctx.arc(eyeOffsetX + e.size*0.15 + (isFacingRight?1:-1), visualY - e.size*0.3, e.size*0.04, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'white'; ctx.font = 'bold 16px Arial'; ctx.textAlign = 'center';
                ctx.fillText(`Lv.${e.tier}`, 0, visualY - e.size*0.9 - 10);
                let hpBarWidth = e.tier === 5 ? 100 : 50;
                ctx.fillStyle = '#334155'; ctx.fillRect(-hpBarWidth/2, visualY - e.size*0.7 - 15, hpBarWidth, 8);
                ctx.fillStyle = '#ef4444'; ctx.fillRect(-hpBarWidth/2, visualY - e.size*0.7 - 15, hpBarWidth * (e.hp / e.maxHp), 8);
                ctx.restore();
            }
            else if (item.type === 'player') {
                let p = item.obj;
                let isFacingRight = (rightJoy.active) ? (Math.abs(rightJoy.angle) < Math.PI/2) : (mouseX > p.x);
                let bob = p.isMoving ? Math.sin(globalTime * 0.5) * 4 : 0;
                ctx.save(); ctx.translate(p.x, p.y);
                ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(0, 0, p.radius*1.2, p.radius*0.5, 0, 0, Math.PI*2); ctx.fill();
                let visualY = -10 + bob;
                let wepColor = WEAPONS[p.weaponLevel].color;
                let gunDrawLogic = () => {
                    ctx.save(); ctx.translate(0, visualY - 5); ctx.rotate(p.angle);
                    if (Math.abs(p.angle) > Math.PI/2) ctx.scale(1, -1);
                    ctx.fillStyle = '#1e293b'; ctx.fillRect(0 - p.recoilOffset, -4, 25, 8); 
                    ctx.fillStyle = '#475569'; ctx.fillRect(10 - p.recoilOffset, -2, 15, 4); 
                    ctx.fillStyle = wepColor; ctx.fillRect(25 - p.recoilOffset, -3, 6, 6); 
                    ctx.restore();
                };
                let aimUp = Math.sin(p.angle) < 0;
                if (aimUp) gunDrawLogic();
                ctx.fillStyle = '#dc2626'; ctx.beginPath(); ctx.moveTo(-12, visualY - 10); ctx.lineTo(-20, visualY + 20); ctx.lineTo(20, visualY + 20); ctx.lineTo(12, visualY - 10); ctx.fill();
                let legSwing = p.isMoving ? Math.sin(globalTime * 0.8) * 8 : 0;
                ctx.fillStyle = '#475569'; ctx.fillRect(-8, visualY + 15 - legSwing, 6, 12); ctx.fillRect(2, visualY + 15 + legSwing, 6, 12);
                ctx.fillStyle = '#1d4ed8'; ctx.fillRect(-12, visualY - 15, 24, 30); 
                ctx.fillStyle = '#94a3b8'; ctx.fillRect(-14, visualY - 15, 28, 16); 
                ctx.fillStyle = '#fcd34d'; ctx.beginPath(); ctx.arc(0, visualY - 25, 16, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#cbd5e1'; ctx.beginPath(); ctx.arc(0, visualY - 28, 17, Math.PI, 0); ctx.fill();
                ctx.fillRect(-18, visualY - 28, 36, 6); 
                ctx.fillStyle = '#b91c1c'; ctx.fillRect(-3, visualY - 48, 6, 12);
                let eyeX = Math.cos(p.angle) * 3; let eyeY = Math.sin(p.angle) * 3;
                ctx.fillStyle = '#1e293b'; ctx.beginPath(); ctx.arc(-5 + eyeX, visualY - 23 + eyeY, 3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(5 + eyeX, visualY - 23 + eyeY, 3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#fcd34d'; ctx.beginPath(); ctx.arc(Math.cos(p.angle)*10 - p.recoilOffset, visualY - 5 + Math.sin(p.angle)*10, 5, 0, Math.PI*2); ctx.fill();
                if (!aimUp) gunDrawLogic(); 
                ctx.restore();

        }

        for (let b of bullets) {
            ctx.shadowBlur = 15; ctx.shadowColor = b.glow; ctx.fillStyle = b.color; 
            ctx.save(); ctx.translate(b.x, b.y - 15); ctx.rotate(Math.atan2(b.vy, b.vx)); 
            ctx.beginPath(); ctx.roundRect(-10, -b.radius/2, 20 + b.radius*2, b.radius, 5); ctx.fill();
            ctx.restore(); ctx.shadowBlur = 0;
        }
        for (let p of particles) {
            ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1.0;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        for (let text of floatingTexts) {
            ctx.globalAlpha = text.life; ctx.fillStyle = text.color; ctx.font = `bold ${text.size}px Arial`;
            ctx.strokeStyle = 'white'; ctx.lineWidth = 3; ctx.strokeText(text.text, text.x, text.y); ctx.fillText(text.text, text.x, text.y);
        }
        ctx.globalAlpha = 1.0; ctx.restore(); 

        if (gameState === 'PLAYING' && ('ontouchstart' in window)) {
            const drawJoy = (joy, base) => {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)'; ctx.beginPath(); ctx.arc(base.x, base.y, joyRadius, 0, Math.PI*2); ctx.fill();
                ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)'; ctx.stroke();
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)'; ctx.beginPath(); ctx.arc(joy.stick.x, joy.stick.y, joyRadius/2.5, 0, Math.PI*2); ctx.fill();
            };
            drawJoy(leftJoy, leftJoyBase); 
            if (rightJoy.active) drawJoy(rightJoy, rightJoy.base);

        ctx.textAlign = 'left'; 
        ctx.fillStyle = 'rgba(241, 245, 249, 0.9)'; 
        ctx.beginPath(); ctx.roundRect(20, 20, 280, 95, 8); ctx.fill();
        ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 3; ctx.stroke();
        ctx.fillStyle = '#e2e8f0'; ctx.beginPath(); ctx.arc(65, 65, 30, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fcd34d'; ctx.beginPath(); ctx.arc(65, 65, 14, 0, Math.PI*2); ctx.fill(); 
        ctx.fillStyle = '#94a3b8'; ctx.beginPath(); ctx.arc(65, 62, 15, Math.PI, 0); ctx.fill(); 
        ctx.fillRect(50, 62, 30, 4); 
        ctx.fillStyle = '#dc2626'; ctx.fillRect(62, 42, 6, 10); 
        ctx.fillStyle = '#1e293b'; ctx.fillRect(59, 62, 4, 4); ctx.fillRect(67, 62, 4, 4); 
        ctx.fillStyle = '#cbd5e1'; ctx.fillRect(105, 32, 180, 16);
        ctx.fillStyle = player.hp > 30 ? '#22c55e' : '#ef4444'; ctx.fillRect(105, 32, (Math.max(0, player.hp) / player.maxHp) * 180, 16);
        ctx.strokeStyle = '#475569'; ctx.lineWidth = 2; ctx.strokeRect(105, 32, 180, 16);
        ctx.fillStyle = 'white'; ctx.font = 'bold 12px Arial'; ctx.fillText(`HP: ${Math.max(0, player.hp)}`, 110, 44);
        let currWep = WEAPONS[player.weaponLevel];
        ctx.fillStyle = '#000000'; ctx.font = 'bold 16px Arial'; ctx.fillText(`武裝: ${currWep.name}`, 105, 70);
        if (player.isReloading) ctx.fillText(`換彈中...`, 105, 95);
        else ctx.fillText(`彈藥: ${player.currentMagazine} / ${player.totalAmmo}`, 105, 95);

        let panelWidth = 140; let panelHeight = 210; let uiX = canvas.width - panelWidth - 20; let uiY = 20;
        ctx.fillStyle = 'rgba(241, 245, 249, 0.9)'; ctx.beginPath(); ctx.roundRect(uiX, uiY, panelWidth, panelHeight, 8); ctx.fill();
        ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 3; ctx.stroke();
        ctx.fillStyle = '#000000'; ctx.textAlign = 'center'; ctx.font = 'bold 16px Arial'; ctx.fillText('剩餘魔物目標', uiX + panelWidth/2, uiY + 25);
        let mTypes = [{ tier: 1, color: '#ef4444' }, { tier: 2, color: '#f97316' }, { tier: 3, color: '#eab308' }, { tier: 4, color: '#84cc16' }, { tier: 5, color: '#a855f7' }];
        for (let i = 0; i < 5; i++) {
            let m = mTypes[i]; let rowY = uiY + 55 + i * 32; ctx.save(); ctx.translate(uiX + 35, rowY);
            let eSize = 18; ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.beginPath(); ctx.ellipse(0, 2, eSize*0.5, eSize*0.2, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = m.color; ctx.beginPath(); ctx.arc(0, -eSize*0.4, eSize*0.45, Math.PI, 0); ctx.lineTo(eSize*0.45, eSize*0.1); ctx.lineTo(-eSize*0.45, eSize*0.1); ctx.fill();
            if (m.tier === 5) { ctx.fillStyle = '#334155'; ctx.beginPath(); ctx.moveTo(-eSize*0.2, -eSize*0.4); ctx.lineTo(-eSize*0.5, -eSize*0.7); ctx.lineTo(-eSize*0.3, -eSize*0.3); ctx.fill(); ctx.beginPath(); ctx.moveTo(eSize*0.2, -eSize*0.4); ctx.lineTo(eSize*0.5, -eSize*0.7); ctx.lineTo(eSize*0.3, -eSize*0.3); ctx.fill(); ctx.fillStyle = '#fbbf24'; ctx.beginPath(); ctx.moveTo(-10, -eSize*0.4); ctx.lineTo(-12, -eSize*0.6); ctx.lineTo(0, -eSize*0.5); ctx.lineTo(12, -eSize*0.6); ctx.lineTo(10, -eSize*0.4); ctx.fill(); }
            else { ctx.fillStyle = '#fca5a5'; ctx.beginPath(); ctx.arc(0, -2, eSize*0.2, 0, Math.PI * 2); ctx.fill(); }
            ctx.fillStyle = m.tier >= 3 ? '#ef4444' : 'white'; ctx.beginPath(); ctx.arc(-3, -eSize*0.3, 2, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(3, -eSize*0.3, 2, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(-3, -eSize*0.3, 1, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(3, -eSize*0.3, 1, 0, Math.PI*2); ctx.fill(); ctx.restore();
            ctx.fillStyle = '#000000'; ctx.textAlign = 'left'; ctx.font = 'bold 16px Arial'; ctx.fillText(`x ${Math.max(0, monstersLeft[m.tier])}`, uiX + 65, rowY + 5);
        }

        if (gameState === 'MATH_TIME') {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.85)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save(); ctx.translate(canvas.width/2, canvas.height/2); ctx.scale(currentMath.scale, currentMath.scale); 
            let headerText = currentMath.type === 'UPGRADE' ? '⚡ WEAPON EVOLUTION MODULE ⚡' : '🔵 AMMO RESUPPLY MODULE 🔵';
            let headerColor = currentMath.type === 'UPGRADE' ? '#eab308' : '#38bdf8';
            ctx.fillStyle = headerColor; ctx.font = 'bold 26px Arial'; ctx.textAlign = 'center'; ctx.fillText(headerText, 0, -240);
            ctx.fillStyle = '#334155'; ctx.fillRect(-200, -190, 400, 15);
            ctx.fillStyle = mathTimer > 180 ? '#4ade80' : '#ef4444'; ctx.fillRect(-200, -190, 400 * (mathTimer / 600), 15);
            ctx.fillStyle = 'white'; ctx.font = 'bold 65px Arial'; ctx.fillText(currentMath.question, 0, -110);
            ctx.fillStyle = '#1e293b'; ctx.beginPath(); ctx.roundRect(-150, -70, 300, 70, 10); ctx.fill();
            ctx.strokeStyle = headerColor; ctx.lineWidth = 4; ctx.stroke();
            let cursor = (globalTime % 60 < 30) ? '_' : ''; ctx.fillStyle = '#fbbf24'; ctx.font = 'bold 50px Courier New'; ctx.fillText(currentMath.userInput + cursor, 0, -30);
            ctx.restore();
            if (currentMath.scale >= 1) { 
                for (let btn of numpadButtons) {
                    ctx.fillStyle = '#1e293b'; ctx.beginPath(); ctx.roundRect(btn.x, btn.y, btn.w, btn.h, 12); ctx.fill();
                    ctx.strokeStyle = headerColor; ctx.lineWidth = 2; ctx.stroke();
                    if (!('ontouchstart' in window) && mouseX >= btn.x && mouseX <= btn.x + btn.w && mouseY >= btn.y && mouseY <= btn.y + btn.h) ctx.fillStyle = 'rgba(255, 255, 255, 0.2)'; ctx.fill();
                    ctx.fillStyle = 'white'; ctx.font = 'bold 32px Arial'; ctx.textAlign = 'center'; ctx.fillText(btn.label, btn.x + btn.w/2, btn.y + btn.h/2);
                }
            }
            ctx.fillStyle = currentMath.messageColor; ctx.font = '22px Arial'; ctx.textAlign = 'center'; ctx.fillText(currentMath.message, canvas.width/2, canvas.height/2 + 350);
            ctx.fillStyle = '#cbd5e1'; ctx.font = '18px Arial'; ctx.fillText('用實體鍵盤或虛擬按鍵作答', canvas.width/2, canvas.height/2 + 390);
        }

        if (gameState === 'GAME_OVER' || gameState === 'VICTORY') {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.9)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = 'center';
            if (gameState === 'VICTORY') {
                ctx.fillStyle = '#fbbf24'; ctx.font = 'bold 60px Arial'; ctx.shadowBlur = 25; ctx.shadowColor = '#eab308';
                ctx.fillText('任務完成！', canvas.width/2, canvas.height/2 - 50);
                ctx.fillStyle = 'white'; ctx.font = 'bold 24px Arial'; ctx.shadowBlur = 0;
                ctx.fillText(`成功擊殺 ${TOTAL_MONSTERS} 隻魔物！`, canvas.width/2, canvas.height/2 + 20);
                ctx.fillText(`裝備神器: ${WEAPONS[player.weaponLevel].name}`, canvas.width/2, canvas.height/2 + 60);
            } else {
                ctx.fillStyle = '#ef4444'; ctx.font = 'bold 80px Arial'; ctx.shadowBlur = 25; ctx.shadowColor = '#dc2626';
                ctx.fillText('YOU DIED', canvas.width/2, canvas.height/2 - 50);
                ctx.fillStyle = 'white'; ctx.font = 'bold 28px Arial'; ctx.shadowBlur = 0;
                ctx.fillText(`擊殺進度: ${enemiesKilled} / ${TOTAL_MONSTERS}`, canvas.width/2, canvas.height/2 + 30);
            }
            ctx.globalAlpha = (globalTime % 60 < 30) ? 1 : 0.5; ctx.fillStyle = '#cbd5e1'; ctx.font = '26px Arial';
            ctx.fillText('>> 點擊畫面或按 Enter 重新挑戰 <<', canvas.width/2, canvas.height/2 + 130); ctx.globalAlpha = 1.0;
        }
        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'left'; ctx.fillText('V22', 20, canvas.height - 20);
    }

    async function loadGameData() {
        if (GAS_WEB_APP_URL) {
            try {
                let res = await fetch(GAS_WEB_APP_URL); let data = await res.json();
                if (data.weapons && data.weapons.length > 1) {
                    let rows = data.weapons;
                    for(let i=1; i<rows.length; i++) {
                        if (rows[i].length >= 7 && WEAPONS[i-1]) {
                            WEAPONS[i-1].name = String(rows[i][1]).trim() || WEAPONS[i-1].name;
                            WEAPONS[i-1].damage = parseFloat(rows[i][2]) || WEAPONS[i-1].damage;
                            WEAPONS[i-1].bullets = parseInt(rows[i][3]) || WEAPONS[i-1].bullets;
                            WEAPONS[i-1].fireRate = parseInt(rows[i][4]) || WEAPONS[i-1].fireRate;
                            WEAPONS[i-1].playerSpeed = parseFloat(rows[i][5]) || WEAPONS[i-1].playerSpeed;
                            WEAPONS[i-1].reloadAmmo = parseInt(rows[i][6]) || WEAPONS[i-1].reloadAmmo;
                        }
                    }
                }
                if (data.monsters && data.monsters.length > 1) {
                    let rows = data.monsters;
                    for(let i=1; i<rows.length; i++) {
                        if (rows[i].length >= 5 && MONSTER_BASE[i-1]) {
                            MONSTER_BASE[i-1].name = String(rows[i][1]).trim() || MONSTER_BASE[i-1].name;
                            MONSTER_BASE[i-1].count = parseInt(rows[i][2]) || MONSTER_BASE[i-1].count;
                            MONSTER_BASE[i-1].hp = parseFloat(rows[i][3]) || MONSTER_BASE[i-1].hp;
                            MONSTER_BASE[i-1].speed = parseFloat(rows[i][4]) || MONSTER_BASE[i-1].speed;
                        }
                    }
                }
            } catch(e) { console.error("載入數據失敗，使用本地預設值:", e); }
        }
        document.getElementById('loading-screen').style.display = 'none';
        resetGame(); gameLoop();
    }
    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
    loadGameData();
</script>
